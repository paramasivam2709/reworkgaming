<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Stackly GAMING</title>
  <meta name="description" content="Reset your Stackly GAMING account password.">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body class="auth-page">
  <div class="auth-bg"></div>
  
  <div class="particles-container">
    <canvas id="particles-canvas"></canvas>
  </div>

  <div class="auth-container">
    <div class="auth-card reveal-scale" style="max-width: 420px;">
      <div class="auth-logo">
        <a href="../index.html" class="logo">
      <img src="../images/logo_green.webp" alt="Stackly Logo" class="logo-img">
      <span class="logo-text">Stackly</span>
      </a>
      </div>
      
      <h1 class="auth-title">Forgot Password?</h1>
      <p class="auth-subtitle">Enter your email and we'll send you a reset link</p>
      
      <form id="forgot-form">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" placeholder="Enter your email" required>
        </div>
        
        <button type="submit" class="btn btn-primary btn-lg w-full">
          <i class="fas fa-paper-plane"></i> Send Reset Link
        </button>
      </form>
      
      <div class="auth-footer">
        <p>Remember your password? <a href="login.html">Login</a></p>
      </div>
    </div>
  </div>

  <script src="../js/particles.js"></script>
  <script>
    document.getElementById('forgot-form').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('Password reset link sent to your email!');
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
