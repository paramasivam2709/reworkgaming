<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Stackly GAMING</title>
  <meta name="description" content="Create your Stackly GAMING account.">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body class="auth-page">
  <div class="auth-bg"></div>
  
  <div class="particles-container">
    <canvas id="particles-canvas"></canvas>
  </div>

  <div class="auth-container">
    <div class="auth-card reveal-scale">
      <div class="auth-logo">
        <a href="../index.html" class="logo">
      <img src="../images/logo_green.png" alt="Stackly Logo" class="logo-img">
      <span class="logo-text">Stackly</span>
      </a>
      </div>
      
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-subtitle">Join the ultimate gaming community</p>
      
      <form id="register-form">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">First Name</label>
            <input type="text" class="form-input" placeholder="John" required>
          </div>
          <div class="form-group">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-input" placeholder="Doe" required>
          </div>
        </div>
        
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" class="form-input" placeholder="johndoe123" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" placeholder="john@example.com" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" placeholder="Create a password" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-input" placeholder="Confirm your password" required>
        </div>
        
        <div class="form-group">
          <label class="remember-me">
            <input type="checkbox" required>
            <span>I agree to the <a href="#" style="color: var(--primary);">Terms of Service</a> and <a href="#" style="color: var(--primary);">Privacy Policy</a></span>
          </label>
        </div>
        
        <button type="submit" class="btn btn-primary btn-lg w-full">
          <i class="fas fa-user-plus"></i> Create Account
        </button>
      </form>
      
      <div class="social-login">
        <div class="social-login-divider">Or register with</div>
        <div class="social-buttons">
          <button class="social-btn">
            <i class="fab fa-google"></i> Google
          </button>
          <button class="social-btn">
            <i class="fab fa-discord"></i> Discord
          </button>
        </div>
      </div>
      
      <div class="auth-footer">
        <p>Already have an account? <a href="login.html">Login</a></p>
      </div>
    </div>
  </div>

  <script src="../js/particles.js"></script>
  <script>
    document.getElementById('register-form').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('Account created successfully! Redirecting to login...');
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
