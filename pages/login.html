<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Stackly GAMING</title>
  <meta name="description" content="Login to your Stackly GAMING account.">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body class="auth-page">
  <div class="auth-bg"></div>
  
  <div class="particles-container">
    <canvas id="particles-canvas"></canvas>
  </div>

  <div class="auth-container">
    <div class="auth-card reveal-scale">
      <div class="auth-logo">
        <a href="../index.html" class="logo">
      <img src="../images/logo_green.webp" alt="Stackly Logo" class="logo-img">
      <span class="logo-text">Stackly</span>
      </a>
      </div>
      
      <h1 class="auth-title">Welcome Back!</h1>
      <p class="auth-subtitle">Login to access your account</p>
      
      <form id="login-form">
        <div class="role-selection">
          <label class="role-option">
            <input type="radio" name="role" value="user" checked>
            <div class="role-card">
              <div class="role-icon">
                <i class="fas fa-user"></i>
              </div>
              <div class="role-name">User</div>
              <div class="role-desc">Gamer Account</div>
            </div>
          </label>
          <label class="role-option">
            <input type="radio" name="role" value="admin">
            <div class="role-card">
              <div class="role-icon">
                <i class="fas fa-shield-alt"></i>
              </div>
              <div class="role-name">Admin</div>
              <div class="role-desc">Administrator</div>
            </div>
          </label>
        </div>
        
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" placeholder="Enter your email" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" placeholder="Enter your password" required>
        </div>
        
        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox">
            <span>Remember me</span>
          </label>
          <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
        </div>
        
        <button type="submit" class="btn btn-primary btn-lg w-full">
          <i class="fas fa-sign-in-alt"></i> Login
        </button>
      </form>
      
      <div class="social-login">
        <div class="social-login-divider">Or login with</div>
        <div class="social-buttons">
          <a href="404.html">
            <button class="social-btn">
              <i class="fab fa-google"></i> Google
            </button>
          </a>
          <a href="404.html">
            <button class="social-btn">
              <i class="fab fa-discord"></i> Discord
            </button>
          </a>
        </div>
      </div>
      
      <div class="auth-footer">
        <p>Don't have an account? <a href="register.html">Register</a></p>
      </div>
    </div>
  </div>

  <script src="../js/particles.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const role = document.querySelector('input[name="role"]:checked').value;
      
      if (role === 'admin') {
        window.location.href = '../dashboard/admin.html';
      } else {
        window.location.href = '../dashboard/user.html';
      }
    });
  </script>
</body>
</html>
